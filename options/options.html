<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO3 Additions Options</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <header>
        <h1>Ao3 Extension Options</h1>
    </header>
    <main>
        <section>
            <h2>Data Management</h2>
            <button id="clear-data">Clear All Extension Data</button>
            <button id="export-data">Export All Data</button>
            <button id="import-data-merge">Import Data (Merge)</button>
            <button id="import-data-replace">Import Data (Replace)</button>
        </section>
        <section>
            <h2>Tag Blocking</h2>
            <label for="blocked-tags">Blocked Tags (comma-separated):</label>
            <input type="text" id="blocked-tags" placeholder="Enter tags to block... ">
            <button id="save-blocked-tags">Save Blocked Tags</button>
        </section>
        <section>
            <h2>Information</h2>
            <p>Version: v1.1</p>
            <p>Disclaimer: This is not an official extension</p>
            <a href="https://www.github.com/williamwith4ms/ao3_additions/LICENSE">License</a>
        </section>
    </main>
    <script type="module" src="options.js"></script>
</body>

</html>
